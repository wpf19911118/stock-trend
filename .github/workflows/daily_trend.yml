name: Daily Stock Trend Monitor

on:
  schedule:
    - cron: '30 7 * * *'  # UTC = 北京时间15:30
  workflow_dispatch:
  push:
    branches: [main]

env:
  SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}

jobs:
  run-trend-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run trend analysis
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python stock_trend.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trend-results
          path: results/
          retention-days: 7
